name: Build and Release ESP32 Firmware

on:
  workflow_dispatch:  # 只允许手动触发

env:
  IDF_VERSION: "v5.5.2"
  BOARD_NAME: "waveshare-s3-rlcd-4.2"
  UPSTREAM_REPO: "https://github.com/ZhouhaoJiang/xiaozhi-esp32"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Generate version number
      id: version
      run: |
        # 生成版本号：YYYY.MM.DD-HHMMSS
        VERSION=$(date -u +"%Y.%m.%d-%H%M%S")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Generated version: $VERSION"
    
    - name: Checkout current repository
      uses: actions/checkout@v4
    
    - name: Clone xiaozhi-esp32 repository
      run: |
        echo "Cloning upstream repository..."
        rm -rf xiaozhi-esp32
        git clone --depth 1 ${{ env.UPSTREAM_REPO }}
        cd xiaozhi-esp32
        echo "Upstream commit: $(git rev-parse HEAD)"
    
    - name: Create secret_config.h from example
      run: |
        cd xiaozhi-esp32
        if [ -f "./main/boards/${{ env.BOARD_NAME }}/secret_config.h.example" ]; then
          cp ./main/boards/${{ env.BOARD_NAME }}/secret_config.h.example ./main/boards/${{ env.BOARD_NAME }}/secret_config.h
          echo "✅ secret_config.h created from example"
        else
          echo "⚠️ secret_config.h.example not found, creating empty secret_config.h"
          echo "// Empty secret config - fill with your own values" > ./main/boards/${{ env.BOARD_NAME }}/secret_config.h
        fi
    
    - name: Build firmware using Docker
      run: |
        cd xiaozhi-esp32
        echo "Starting firmware build..."
        docker run --rm \
          -v $PWD:/project \
          -w /project \
          espressif/idf:${{ env.IDF_VERSION }} \
          bash -c "source \$IDF_PATH/export.sh && python scripts/release.py ${{ env.BOARD_NAME }} --name ${{ env.BOARD_NAME }}"
        echo "Build completed!"
    
    - name: List generated firmware files
      run: |
        echo "Generated files in releases directory:"
        ls -la ./xiaozhi-esp32/releases/
        echo ""
        echo "ZIP files found:"
        find ./xiaozhi-esp32/releases -name "*.zip" -type f
    
    - name: Create Release with date-based version
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ steps.version.outputs.version }}
        tag_name: ${{ steps.version.outputs.version }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ./xiaozhi-esp32/releases/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload firmware as artifact (for debugging)
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ steps.version.outputs.version }}
        path: |
          ./xiaozhi-esp32/releases/*.zip
        retention-days: 30
