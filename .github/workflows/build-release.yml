name: Build and Release ESP32 Firmware

on:
  workflow_dispatch:  # 允许手动触发
  push:
    tags:
      - 'v*'  # 当推送版本标签时触发，如 v1.0.0
  pull_request:
    branches: [ main, master ]

env:
  IDF_VERSION: "v5.5.2"
  BOARD_NAME: "waveshare-s3-rlcd-4.2"
  RELEASE_DIR: "./releases"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive  # 如果有子模块，递归拉取
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Clone xiaozhi-esp32 repository
      run: |
        git clone https://github.com/ZhouhaoJiang/xiaozhi-esp32
        cd xiaozhi-esp32
        
    - name: Create secret_config.h from example
      run: |
        cd xiaozhi-esp32
        if [ -f "./main/boards/${{ env.BOARD_NAME }}/secret_config.h.example" ]; then
          cp ./main/boards/${{ env.BOARD_NAME }}/secret_config.h.example ./main/boards/${{ env.BOARD_NAME }}/secret_config.h
          echo "✅ secret_config.h created from example"
        else
          echo "⚠️ secret_config.h.example not found, creating empty secret_config.h"
          echo "// Empty secret config - fill with your own values" > ./main/boards/${{ env.BOARD_NAME }}/secret_config.h
        fi
    
    - name: Build firmware using Docker
      run: |
        cd xiaozhi-esp32
        docker run --rm \
          -v $PWD:/project \
          -w /project \
          espressif/idf:${{ env.IDF_VERSION }} \
          bash -c "source \$IDF_PATH/export.sh && python scripts/release.py ${{ env.BOARD_NAME }} --name ${{ env.BOARD_NAME }}"
    
    - name: List generated firmware files
      run: |
        echo "Generated files in releases directory:"
        find ./xiaozhi-esp32/releases -type f -name "*.bin" -o -name "*.elf" -o -name "*.map" | xargs ls -la
        
    - name: Upload firmware as artifact
      uses: actions/upload-artifact@v4
      if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
      with:
        name: firmware-artifacts
        path: |
          ./xiaozhi-esp32/releases/
        retention-days: 7
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ./xiaozhi-esp32/releases/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
